  #   - "revenue per user" / "ARPU" (revenue is lagging)
  #   - "customer acquisition cost" / "CAC" (input metric, not NSM)
  #   - "lifetime value" / "LTV" (lagging; output of input metrics)
  #   - "net promoter score" / "NPS" (satisfaction proxy, not value-delivered)
  #   - "churn rate" / "retention rate" (lagging; use leading proxies)
  #   - "gross merchandise value" / "GMV" (lagging; transaction-game specific)
  #   - "downloads" (top-of-funnel, not value)
  #   - "time on site" / "session duration" (only valid for attention games; vanity for productivity)
  #   - "engagement score" (composite; usually masks value-delivery question)
  #   - "feature adoption rate" (specific-feature; not whole-product NSM)
  #
  # For each: confirm with a wiki anti-pattern slug OR a wiki debate slug. If it's debated,
  # don't put it here — put it in the wiki/debates/ instead and let the LLM Auditor handle it.
