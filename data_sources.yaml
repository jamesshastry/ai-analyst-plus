# data_sources.yaml -- Connection registry for registered data sources
# Tracks HOW to connect. The data brain (WHAT it contains) lives in .knowledge/datasets/
# The active dataset pointer is in .knowledge/active.yaml (not here).

sources:
  novamart:
    display_name: "NovaMart"
    description: "E-commerce platform with full product analytics: users, sessions, event funnel, orders, products, experiments"
    connection_type: "duckdb"
    database: "data/practice/novamart_practice.duckdb"
    schema_prefix: "novamart"
    data_dir: "data/practice/"
    fallback_dir: "data/practice/"
    fallback_available: true
    registered_at: "2026-04-10"
