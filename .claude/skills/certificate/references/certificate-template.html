<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate of Completion — AI Analyst Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111118;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════════════════════════════════════════════════════
     BASE — 1920 x 1080 (16:9) matching Marp deck slides
     ═══════════════════════════════════════════════════════════ */

  .certificate {
    width: 1920px;
    height: 1080px;
    background: linear-gradient(160deg, #1A1A17 0%, #222220 50%, #1A1A17 100%);
    position: relative;
    overflow: hidden;
  }

  /* ── Ornamental double border ── */
  .border-outer {
    position: absolute;
    inset: 16px;
    border: 2px solid rgba(245,158,11,0.25);
    border-radius: 4px;
    z-index: 2;
  }

  .border-inner {
    position: absolute;
    inset: 28px;
    border: 1px solid rgba(245,158,11,0.12);
    border-radius: 2px;
    z-index: 2;
  }

  /* ── Decorative corner flourishes ── */
  .corner {
    position: absolute;
    width: 48px;
    height: 48px;
    z-index: 3;
  }

  .corner::before,
  .corner::after {
    content: '';
    position: absolute;
    background: #f59e0b;
  }

  .corner::before {
    width: 48px;
    height: 3px;
  }

  .corner::after {
    width: 3px;
    height: 48px;
  }

  .corner-tl { top: 16px; left: 16px; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after { top: 0; left: 0; }

  .corner-tr { top: 16px; right: 16px; }
  .corner-tr::before { top: 0; right: 0; }
  .corner-tr::after { top: 0; right: 0; }

  .corner-bl { bottom: 16px; left: 16px; }
  .corner-bl::before { bottom: 0; left: 0; }
  .corner-bl::after { bottom: 0; left: 0; }

  .corner-br { bottom: 16px; right: 16px; }
  .corner-br::before { bottom: 0; right: 0; }
  .corner-br::after { bottom: 0; right: 0; }

  /* ── Subtle grid background ── */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: 0;
  }

  /* ── Ambient glow ── */
  .glow {
    position: absolute;
    top: -80px;
    left: 25%;
    width: 900px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.03) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .glow-bottom {
    position: absolute;
    bottom: -80px;
    right: 25%;
    width: 900px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.02) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  /* ── Diagonal watermark ── */
  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-family: 'Inter', sans-serif;
    font-size: 120px;
    font-weight: 900;
    color: rgba(245,158,11,0.015);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  /* ═══════════════════════════════════════════════════════════
     CONTENT
     ═══════════════════════════════════════════════════════════ */

  .content {
    position: relative;
    z-index: 4;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 160px;
    text-align: center;
  }

  /* ── Heading ── */
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.45em;
    font-size: 13px;
    font-weight: 700;
    color: #f59e0b;
    margin-bottom: 12px;
  }

  .heading {
    font-size: 18px;
    font-weight: 600;
    color: #71717a;
    letter-spacing: 0.08em;
    margin-bottom: 28px;
  }

  /* ── Divider ── */
  .divider {
    width: 240px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(245,158,11,0.4) 30%, rgba(245,158,11,0.4) 70%, transparent 100%);
    margin-bottom: 28px;
    position: relative;
  }

  .divider::after {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 7px;
    height: 7px;
    background: #f59e0b;
    border-radius: 50%;
  }

  /* ── Student name (serif for contrast) ── */
  .student-name {
    font-family: 'Playfair Display', serif;
    font-size: 58px;
    font-weight: 800;
    color: #f59e0b;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 24px;
  }

  /* ── Completion statement ── */
  .completion {
    font-size: 15px;
    font-weight: 500;
    color: #a1a1aa;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .course-title {
    font-size: 26px;
    font-weight: 800;
    color: #fafafa;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  /* ── Date row ── */
  .meta-row {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 28px;
  }

  .meta-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #52525b;
  }

  .meta-item .label {
    color: #3f3f46;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 9px;
    display: block;
    margin-bottom: 2px;
  }

  /* ── Signature row (two signatures) ── */
  .signature-row {
    display: flex;
    gap: 80px;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .signature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .signature-line {
    width: 220px;
    height: 1px;
    background: rgba(245,158,11,0.25);
  }

  .signature-name {
    font-size: 14px;
    font-weight: 600;
    color: #a1a1aa;
  }

  .signature-title {
    font-size: 11px;
    font-weight: 500;
    color: #52525b;
  }

  /* ═══════════════════════════════════════════════════════════
     SEAL — circular badge for authenticity
     ═══════════════════════════════════════════════════════════ */

  .seal {
    position: absolute;
    bottom: 60px;
    right: 80px;
    width: 120px;
    height: 120px;
    z-index: 5;
  }

  .seal-outer {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(245,158,11,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 40% 35%, rgba(245,158,11,0.12) 0%, rgba(245,158,11,0.03) 60%, transparent 100%);
    position: relative;
  }

  .seal-inner {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 1px solid rgba(245,158,11,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .seal-icon {
    font-size: 24px;
    color: #f59e0b;
    line-height: 1;
  }

  .seal-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(245,158,11,0.7);
    text-align: center;
    line-height: 1.3;
  }

  /* ── CTA ── */
  .cta {
    font-size: 13px;
    font-weight: 600;
    color: rgba(245,158,11,0.4);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="certificate">
  <!-- Background layers -->
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="glow-bottom"></div>
  <div class="watermark">AI Analyst Lab</div>

  <!-- Ornamental border -->
  <div class="border-outer"></div>
  <div class="border-inner"></div>

  <!-- Corner flourishes -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Seal -->
  <div class="seal">
    <div class="seal-outer">
      <div class="seal-inner">
        <div class="seal-icon">&#9670;</div>
        <div class="seal-text">AI Analyst<br>Lab</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="eyebrow">Certificate of Completion</div>
    <div class="divider"></div>
    <div class="student-name">{{STUDENT_NAME}}</div>
    <div class="completion">has successfully completed</div>
    <div class="course-title">AI Analyst Lab</div>
    <div class="meta-row">
      <div class="meta-item">
        <span class="label">Date</span>
        {{DATE}}
      </div>
    </div>

    <div class="signature-row">
      <div class="signature">
        <div class="signature-line"></div>
        <div class="signature-name">Shane Butler</div>
        <div class="signature-title">Instructor</div>
      </div>
      <div class="signature">
        <div class="signature-line"></div>
        <div class="signature-name">Hai Guan</div>
        <div class="signature-title">Instructor</div>
      </div>
      <div class="signature">
        <div class="signature-line"></div>
        <div class="signature-name">Sravya Madipalli</div>
        <div class="signature-title">Instructor</div>
      </div>
    </div>

    <div class="cta">See what my AI analyst can do &rarr;</div>
  </div>
</div>

</body>
</html>
