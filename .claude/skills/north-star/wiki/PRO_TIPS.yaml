- pro_tip_id: pro-tip-p050-l1163-bets-instead-of-experiments
  tip: Use "bets" instead of "experiments" when talking with executives. Executives understand risk/return/investment/diversification — bets fit that vocabulary; "experiment" makes them ask "when will the team stop experimenting and get to work?"
  concept_id: concept-p048-l0133-three-implementation-traps
  applies_when: When communicating product work to executive stakeholders, especially in companies wary of experimentation.
  playbook_page: 50
  source_span_quote: PRO TIP — Try "bets" instead of "experiments". Though John appreciates the scientific connotation of the word "experiments," he's shifted his vocabulary to more often refer to bets, and less to experiments—unless we're really talking controlled experiments like A/B testing, of course.
