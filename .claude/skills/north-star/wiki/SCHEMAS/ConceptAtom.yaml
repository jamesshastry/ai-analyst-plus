# ConceptAtom.yaml — body claims extracted from the playbook.
# Producer: concept-extractor.

schema_version: 1
schema_name: ConceptAtom
extends: Atom

required_fields:
  - id
  - type
  - schema_version
  - extracted_by
  - extracted_at
  - source
  - controlled_terms
  - tier
  - confidence
  - confidence_derivation
  - curator_status
  - reconciliation_status
  - indices

type_specific_required:
  - claim                  # body field — one-sentence statement of the atom
  - why_atomic             # one sentence on splitting/merging rationale

type_specific_optional:
  - implicit_content_captured   # sidebar / PRO TIP / figure-caption material rolled in

enums:
  type: [concept]
  tier: [1, 2, 3]
  confidence: [high, medium, low]
  curator_status: [pending, approved, rejected, revision_requested]
  reconciliation_status: [pending, reconciled, conflict, waived]

id_pattern: "^concept-p[0-9]{3}-l[0-9]{4}-[a-z0-9-]{1,40}$"
page_size_cap_words: null
