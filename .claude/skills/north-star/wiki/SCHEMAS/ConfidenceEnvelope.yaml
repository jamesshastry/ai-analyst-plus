# ConfidenceEnvelope.yaml — mandatory envelope attached to every runtime API record.
# Source: WIKI_SCHEMA.md §"Runtime API contract" → ConfidenceEnvelope block.

schema_version: 1
schema_name: ConfidenceEnvelope
extends: null

required_fields:
  - tier
  - confidence
  - curator_status
  - verified               # derived: tier <= 2 AND confidence != low AND curator_status == approved
  - curated_by             # string OR null
  - curated_at             # iso8601 OR null

enums:
  tier: [1, 2, 3]
  confidence: [high, medium, low]
  curator_status: [approved, pending, rejected]

field_constraints:
  schema_version: { type: integer, const: 1 }
  verified: { type: boolean }
  curated_by: { type: ["string", "null"] }
  curated_at: { type: ["string", "null"], format: iso8601-or-null }

derived_rule:
  verified:
    formula: "tier <= 2 AND confidence != 'low' AND curator_status == 'approved'"

id_pattern: null
page_size_cap_words: null
